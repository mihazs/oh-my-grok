# Git hooks via https://github.com/evilmartians/lefthook
# Setup: lefthook install  (or: task install:lefthook)

min_version: 1.6.0

pre-commit:
  commands:
    rebuild-hook-binaries:
      run: bash scripts/build-hook.sh && git add bin/omg-hook-linux-amd64 bin/omg-hook-linux-arm64 bin/omg-hook-darwin-amd64 bin/omg-hook-darwin-arm64 bin/omg-hook-windows-amd64.exe